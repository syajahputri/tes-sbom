name: ASP.NET DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      # 1. Persiapan Kode Sumber
      - uses: actions/checkout@v4

      # 2. Setup.NET & Restore dengan Lockfile (Source of Truth)
      - name: Setup.NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Dependencies
        run: dotnet restore --locked-mode # Memastikan akurasi paket sesuai lockfile

      # 3. Pembuatan SBOM (Syft & Trivy)
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: 'cyclonedx-json'
          output-file: 'syft-sbom.json'
      - name: Generate SBOM with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --format cyclonedx --output trivy-sbom.json.

      # 4. Pemindaian Kerentanan (Grype)
      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v3
        id: scan
        with:
          sbom: 'syft-sbom.json'
          fail-build: false # Jangan gagal dulu, kita akan filter dengan Roslyn
          output-format: 'json'

      # 5. Analisis Reachability (Roslyn API)
      # Menjalankan tool Console App Roslyn yang Anda buat
      - name: Run Roslyn Reachability Analysis
        run: |
          dotnet run --project./Tools/RoslynAnalyzer/RoslynAnalyzer.csproj -- \
          --scan-results results.json --output reachable-vulns.json

      # 6. Perhitungan Risiko & Security Gate
      # Mengimplementasikan rumus: (CVSS * EPSS * KEV) * Exposure
      - name: Risk Scoring Gate
        shell: python
        run: |
          import json
          # Variabel Exposure: 1.0 (Public) atau 0.5 (Internal PT XYZ)
          EXPOSURE = 0.5 
          
          with open('reachable-vulns.json') as f:
              vulns = json.load(f)
              
          high_risk_found = False
          for v in vulns:
              # Rumus Risiko Komposit
              risk_score = (v['cvss'] * v['epss'] * v['kev_factor']) * EXPOSURE
              print(f"CVE: {v['id']} | Risk Score: {risk_score}")
              
              if risk_score > 8.0: # Ambang batas kritis
                  high_risk_found = True
          
          if high_risk_found:
              print("ALERTA: Risiko tinggi ditemukan. Deployment dibatalkan!")
              exit(1) # Menghentikan pipeline (Security Gate)

      # 7. Simpan Hasil sebagai Artefak
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            syft-sbom.json
            trivy-sbom.json
            reachable-vulns.json
