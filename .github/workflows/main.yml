name: "ASP.NET DevSecOps: SBOM, Roslyn Reachability & Risk Gate"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SOLUTION_NAME: 'Appointment.sln'
  ROSLYN_TOOL_PATH: './Tools/RoslynAnalyzer/RoslynAnalyzer.csproj'
  EXPOSURE_CONTEXT: 0.5

jobs:
  secure-pipeline:
    name: "Security Analysis & Gate"
    runs-on: ubuntu-latest

    steps:
      # 1. Persiapan Kode Sumber
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Lingkungan .NET
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Restore Dependency
      - name: Restore Dependencies (Locked Mode)
        run: |
          dotnet restore ${{ env.SOLUTION_NAME }} --force-evaluate --use-lock-file
          dotnet restore ${{ env.SOLUTION_NAME }} --locked-mode

      # 4. Generate SBOM (Syft)
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: syft-sbom.json

      # 4b. Generate SBOM (Trivy)
      - name: Generate SBOM (Trivy)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --format cyclonedx --output trivy-sbom.json .

      # 5. Vulnerability Scan (Grype)
      - name: Vulnerability Scan (Grype)
        uses: anchore/scan-action@v3
        id: scan
        with:
          sbom: 'syft-sbom.json'
          fail-build: false
          output-format: 'json'

      # 6. Roslyn Reachability Analysis
#      - name: Roslyn Static Analysis Filter
 #       run: |
 #         dotnet run --project ${{ env.ROSLYN_TOOL_PATH }} -- \
 #         --input-vulns '${{ steps.scan.outputs.json }}' \
 #         --output filtered-vulns.json

      # 7. Risk Scoring Gate
      - name: Context-Aware Risk Scoring Gate
        shell: python
        run: |
          import json
          import sys

          exposure = float("${{ env.EXPOSURE_CONTEXT }}")

          try:
              with open('filtered-vulns.json') as f:
                  data = json.load(f)
          except Exception:
              print("No reachable vulnerabilities found.")
              sys.exit(0)

          high_risk_found = False
          print(f"{'CVE ID':<15} | {'Package':<20} | {'Risk Score':<10} | {'Status'}")
          print("-" * 65)

          for vuln in data['matches']:
              cvss = vuln.get('cvss_score', 0)
              epss = vuln.get('epss_score', 0.01)
              kev_factor = 1.5 if vuln.get('is_kev', False) else 1.0

              risk_score = (cvss * epss * kev_factor) * exposure

              status = "CRITICAL" if risk_score >= 8.0 else "TOLERABLE"
              print(f"{vuln['id']:<15} | {vuln['package']:<20} | {risk_score:.2f} / 10 | {status}")

              if risk_score >= 8.0:
                  high_risk_found = True

          if high_risk_found:
              print("\n[!] SECURITY GATE FAILED: Kerentanan berisiko tinggi terdeteksi untuk konteks PT XYZ.")
              sys.exit(1)
          else:
              print("\n[+] SECURITY GATE PASSED: Aplikasi layak dipublikasikan ke server internal.")

      # 8. Upload Artifact
      - name: Archive Research Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DevSecOps-Research-Artifacts
          path: |
            syft-sbom.json
            trivy-sbom.json
            filtered-vulns.json
